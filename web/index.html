<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandoc PHP - Convert to LaTeX</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 2em auto; line-height: 1.6; }
        form { border: 1px solid #ccc; padding: 2em; border-radius: 8px; }
        .form-group { margin-bottom: 1em; }
        label { display: block; margin-bottom: .5em; font-weight: bold; }
        input[type="file"] { display: block; }
        button { background: #007bff; color: white; border: 0; padding: .5em 1.5em; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .info { background: #e9ecef; padding: 1em; border-radius: 4px; margin-bottom: 2em; }
    </style>
</head>
<body>
    <h1>Pandoc PHP Converter</h1>
    <div class="info">
        <p>Upload a <strong>Markdown (.md)</strong>, <strong>HTML (.html)</strong>, <strong>Jupyter (.ipynb)</strong> or <strong>Word (.docx)</strong> file to convert it to <strong>LaTeX (.tex)</strong> using the Pandoc PHP library.</p>
    </div>

    <form action="convert.php" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="doc_file">Choose File:</label>
            <input type="file" name="doc_file" id="doc_file" accept=".md,.docx,.html,.ipynb" required>
        </div>
        <div class="form-group">
            <label>Output Format:</label>
            <label style="display: inline; font-weight: normal;">
                <input type="radio" name="standalone" value="1" checked> Standalone (Full document with preamble)
            </label><br>
            <label style="display: inline; font-weight: normal;">
                <input type="radio" name="standalone" value="0"> Fragment (Body only)
            </label>
        </div>
        <button type="submit">Convert to LaTeX</button>
    </form>
</body>
</html>
